<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление студента - Задание 3</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Добавление нового студента</h1>
    <p class="text-muted">Группа и логин будут сформированы автоматически</p>

    <div class="card">
        <div class="card-header">
            <h3>Форма студента</h3>
        </div>
        <div class="card-body">
            <form action="#" th:action="@{/form}" th:object="${student}" method="post">

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Фамилия</label>
                        <input type="text" class="form-control" th:field="*{lastName}"
                               placeholder="Введите фамилию" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" class="form-control" th:field="*{firstName}"
                               placeholder="Введите имя" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Отчество</label>
                        <input type="text" class="form-control" th:field="*{middleName}"
                               placeholder="Введите отчество">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               placeholder="example@mail.ru" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Город</label>
                        <input type="text" class="form-control" th:field="*{city}"
                               placeholder="Введите город" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Пол</label>
                        <select class="form-select" th:field="*{gender}" required>
                            <option value="">Выберите пол</option>
                            <option value="Мужской">Мужской</option>
                            <option value="Женский">Женский</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Возраст</label>
                        <input type="number" class="form-control" th:field="*{age}"
                               min="16" max="60" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Факультет</label>
                        <select class="form-select" th:field="*{faculty}" required>
                            <option value="">Выберите факультет</option>
                            <option value="Радиотехнический">Радиотехнический</option>
                            <option value="Информационных технологий">Информационных технологий</option>
                            <option value="Экономический">Экономический</option>
                            <option value="Юридический">Юридический</option>
                        </select>
                    </div>
                </div>

                <div class="alert alert-info">
                    <strong>Информация:</strong> Группа будет сформирована по шаблону "ПИНз-ГГ", где ГГ - последние две цифры текущего года.
                    Логин будет сгенерирован по шаблону "student-{группа}-{id}".
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary btn-lg">Добавить студента</button>
                    <a href="/" class="btn btn-secondary btn-lg">На главную</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
