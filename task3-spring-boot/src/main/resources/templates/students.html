<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список студентов</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Список студентов</h1>

    <div class="mb-3">
        <a href="/students/add" class="btn btn-success">+ Добавить студента</a>
        <a href="/" class="btn btn-secondary">На главную</a>
    </div>

    <div th:if="${students.isEmpty()}" class="alert alert-info">
        Список студентов пуст. Добавьте первого студента!
    </div>

    <div th:unless="${students.isEmpty()}">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Группа</th>
                <th>Факультет</th>
                <th>Город</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.fullName}"></td>
                <td><span class="badge bg-primary" th:text="${student.groupName}"></span></td>
                <td th:text="${student.faculty}"></td>
                <td th:text="${student.city}"></td>
                <td>
                    <a class="btn btn-sm btn-info" th:href="@{/students/details/{id}(id=${student.id})}">Детали</a>
                    <a class="btn btn-sm btn-danger" th:href="@{/students/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Удалить студента?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
